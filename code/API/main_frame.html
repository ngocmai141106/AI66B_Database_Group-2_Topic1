<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Control Panel</title>
    <style>
        /* Page background and font */
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            color: #243248;
        }

        /* Main container for the interface */
        .container {
            max-width: 920px;
            margin: 32px auto;
            padding: 20px;
        }

        /* Top row holds left buttons and right search area */
        .top-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-start;
        }

        /* Group of main action buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .button-row,
        .mode-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: #4c8cff;
            color: white;
        }

        .btn-secondary {
            background: #8a95b8;
            color: white;
        }

        .btn-danger {
            background: #f16d6f;
            color: white;
        }

        .mode-row button {
            background: #e9effa;
            color: #2e3f6d;
            min-width: 76px;
        }

        .search-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            min-width: 240px;
        }

        .combo {
            flex: 1;
            position: relative;
        }

        .combo input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid #c8d4e8;
            background: white;
            font-size: 0.98rem;
        }

        .combo select {
            display: none;
        }

        .global-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: #4d8cff;
            color: white;
            font-size: 1.4rem;
            display: grid;
            place-items: center;
        }

        .frame-area {
            margin-top: 18px;
            border-radius: 20px;
            border: 1px solid #d7e0ef;
            background: white;
            min-height: 180px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(96, 110, 147, 0.08);
        }

        .frame-area h2 {
            margin: 0 0 10px;
            font-size: 1.15rem;
        }

        .frame-area p {
            margin: 0;
            line-height: 1.7;
            color: #526184;
        }

        @media (max-width: 720px) {
            .top-row {
                flex-direction: column;
            }
            .search-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top row: left actions and right combo search -->
        <div class="top-row">
            <div class="actions">
                <!-- Main action buttons -->
                <div class="button-row">
                    <button class="btn-primary" data-action="Create">Create</button>
                    <button class="btn-secondary" data-action="Update">Update</button>
                    <button class="btn-danger" data-action="Delete">Delete</button>
                </div>

                <!-- Secondary mode buttons below main actions -->
                <div class="mode-row">
                    <button>Production</button>
                    <button>F(quên rùi)</button>
                    <button>B</button>
                    <button>Pro</button>
                </div>

                <!-- Frame area is shown when Create/Update/Delete is clicked -->
                <div id="frameArea" class="frame-area">
                    <h2>Action frame</h2>
                    <p>Click Create, Update, or Delete to open a simple frame area here.</p>
                </div>
            </div>

            <!-- Search area with combo box and global find button -->
            <div class="search-panel">
                <div class="combo">
                    <input id="localFind" list="options" placeholder="Local find..." />
                    <datalist id="options">
                        <option value="muhhehe"></option>
                        <option value="Item 2"></option>
                        <option value="Item 3"></option>
                    </datalist>
                </div>

                <button id="globalFind" class="global-btn" title="Global find">⋮</button>
            </div>
        </div>
    </div>

    <script>
        // Handle the Create/Update/Delete buttons and show content in the frame area.
        const frameArea = document.getElementById('frameArea');
        document.querySelectorAll('[data-action]').forEach(button => {
            button.addEventListener('click', () => {
                const action = button.dataset.action;
                frameArea.innerHTML = `
                    <h2>${action} panel</h2>
                    <p>này r sẽ điều chỉnh to toàn màn hình, trừ mấy nút phía trên </p>
                `;
            });
        });

        // Global find button example: open a simple alert.
        document.getElementById('globalFind').addEventListener('click', () => {
            alert('Global find action');
        });
    </script>
