<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Layout</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f4f7fb;
        color: #243248;
    }

    /* ================= TOPBAR ================= */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        background: white;
        border-bottom: 1px solid #d7e0ef;
    }

    /* SEGMENT BUTTON GROUP */
    .left-group {
        display: flex;
        width: 320px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #c8d4e8;
    }

    .btn-tab {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        cursor: pointer;
        user-select: none;
        background: #e9effa;
        color: #2e3f6d;
        font-weight: 600;
        transition: 0.2s;
    }

    .btn-tab:not(:last-child) {
        border-right: 1px solid #c8d4e8;
    }

    .btn-tab:hover {
        background: #dbe7ff;
    }

    /* RIGHT AREA */
    .right-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .search-box {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 12px;
        border: 1px solid #c8d4e8;
        background: white;
    }

    .search-box input {
        border: none;
        outline: none;
        font-size: 0.95rem;
    }

    .icon-box {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: #4c8cff;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }

    /* ================= SUBBAR ================= */
    .subbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        background: white;
        border-bottom: 1px solid #d7e0ef;
    }

    .sub-tabs {
        display: flex;
        width: 320px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #c8d4e8;
    }

    .btn-tab-sub {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        cursor: pointer;
        background: #e9effa;
        color: #2e3f6d;
        font-weight: 600;
    }

    .btn-tab-sub:not(:last-child) {
        border-right: 1px solid #c8d4e8;
    }

    .btn-tab-sub:hover {
        background: #dbe7ff;
    }

    /* ================= MAIN ================= */
    .main {
        flex: 1;
        display: flex;
        gap: 16px;
        padding: 16px;
        min-height: 0;
    }

    .left-panel {
        width: 50%;
        background: white;
        border-radius: 16px;
        border: 1px solid #d7e0ef;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(96, 110, 147, 0.08);
        display: flex;
        flex-direction: column;
    }

    .form-area {
        flex: 1;
        border: 1px dashed #c8d4e8;
        border-radius: 12px;
        margin-bottom: 12px;
        background: #fafcff;
    }

    .bottom-actions {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
    }

    .btn.primary {
        background: #4c8cff;
        color: white;
    }

    .btn.secondary {
        background: #8a95b8;
        color: white;
    }

    .btn.danger {
        background: #f16d6f;
        color: white;
    }

    .right-panel {
        flex: 1;
        background: white;
        border-radius: 16px;
        border: 1px solid #d7e0ef;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(96, 110, 147, 0.08);
        min-height: 0;
        overflow-y: auto;
    }
    
</style>
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

    <div class="left-group">
        <div class="btn-tab">Insert</div>
        <div class="btn-tab">Update</div>
        <div class="btn-tab">Delete</div>
    </div>

    <div class="right-group">
        <div class="icon-box">🔍</div>

        <div class="search-box">
            <input placeholder="Search...">
        </div>

        <div class="icon-box">⋮</div>
    </div>

</div>

<!-- ================= SUB BAR ================= -->
<div class="subbar">

    <div>Insert</div>

    <div class="sub-tabs">
        <div class="btn-tab-sub" onclick = "changeContent('c1a7f2b0-9d3a-4e1f-8a2a-1f9d8a7b1234')">Phone</div>
        <div class="btn-tab-sub" onclick = "changeContent('f2b9c4d1-7e6a-4a3b-9c2b-5d7e8f9a5678')">Fashion</div>
        <div class="btn-tab-sub" onclick = "changeContent('b3c8d5e2-6f7a-4b4c-8d3c-7e9f0a1b9012')">Book</div>
    </div>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="left-panel">
        <div class="form-area"></div>

        <div class="bottom-actions">
            <button class="btn">Cancel</button>
            <button class="btn">Confirm</button>
        </div>
    </div>

    <div class="right-panel" id="right-panel">
        TABLE BEING QUERIED
    </div>

</div>

<script>
    const API_BASE_URL = "http://127.0.0.1:8000";

    async function fetchProductsByCategory(catId) {
        const panel = document.getElementById("right-panel");
        panel.innerHTML = "Loading products...";

        try {
            const response = await fetch(`${API_BASE_URL}/products/by_category/${catId}`);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
            }

            const data = await response.json();
            renderProducts(panel, data.products);
        } catch (error) {
            panel.innerHTML = `<div style="color: red;">Error loading products: ${error.message}</div>`;
        }
    }

    function renderStars(rating) {
        if (rating === undefined || rating === null) return "-";
        const fullStar = "★";
        const emptyStar = "☆";
        const maxStars = 5;
        const safeRating = Math.max(0, Math.min(maxStars, Math.round(rating)));
        return `<span style="color: gold; font-size: 18px;">${fullStar.repeat(safeRating)}${emptyStar.repeat(maxStars - safeRating)}</span>`;
    }

    function renderProducts(panel, products) {
        if (!products || products.length === 0) {
            panel.innerHTML = "No products found for this category.";
            return;
        }

        const rows = products.map(product => {
            const reviewEntries = Array.isArray(product.reviews)
                ? product.reviews.filter(review => review && typeof review.rating === "number")
                : [];
            const ratingFromReviews = reviewEntries.length > 0
                ? reviewEntries.reduce((sum, review) => sum + review.rating, 0) / reviewEntries.length
                : null;
            const rating = ratingFromReviews !== null
                ? ratingFromReviews
                : (typeof product.avg_rating === "number" ? product.avg_rating : null);

            return `
                <div class="product-card" style="margin-bottom: 16px; padding: 12px; border: 1px solid #e4e9f2; border-radius: 12px; background: #f7f9ff;">
                    <div><strong>Name:</strong> ${product.pro_name || "-"}</div>
                    <div><strong>Description:</strong> ${product.description || "-"}</div>
                    <div><strong>Price:</strong> ${product.price ?? "0"}</div>
                    <div><strong>Rating:</strong> ${renderStars(rating)}</div>
                </div>
            `;
        }).join("");

        panel.innerHTML = `<div>${rows}</div>`;
    }

    function changeContent(categories) {
        const panel = document.getElementById("right-panel");
        fetchProductsByCategory(categories);
    }

    window.addEventListener("DOMContentLoaded", () => {
        fetchProductsByCategory("c1a7f2b0-9d3a-4e1f-8a2a-1f9d8a7b1234");
    });
</script>

</body>
</html>
