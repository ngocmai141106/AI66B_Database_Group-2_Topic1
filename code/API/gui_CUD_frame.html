<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Layout</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f4f7fb;
        color: #243248;
    }

    /* ================= TOPBAR ================= */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        background: white;
        border-bottom: 1px solid #d7e0ef;
    }

    /* SEGMENT BUTTON GROUP */
    .left-group {
        display: flex;
        width: 320px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #c8d4e8;
    }

    .btn-tab {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        cursor: pointer;
        user-select: none;
        background: #e9effa;
        color: #2e3f6d;
        font-weight: 600;
        transition: 0.2s;
    }

    .btn-tab:not(:last-child) {
        border-right: 1px solid #c8d4e8;
    }

    .btn-tab:hover {
        background: #dbe7ff;
    }

    /* RIGHT AREA */
    .right-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .search-box {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 12px;
        border: 1px solid #c8d4e8;
        background: white;
    }

    .search-box input {
        border: none;
        outline: none;
        font-size: 0.95rem;
    }

    .icon-box {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: #4c8cff;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }

    /* ================= SUBBAR ================= */
    .subbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        background: white;
        border-bottom: 1px solid #d7e0ef;
    }

    .sub-tabs {
        display: flex;
        width: 320px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #c8d4e8;
    }

    .btn-tab-sub {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        cursor: pointer;
        background: #e9effa;
        color: #2e3f6d;
        font-weight: 600;
    }

    .btn-tab-sub:not(:last-child) {
        border-right: 1px solid #c8d4e8;
    }

    .btn-tab-sub:hover {
        background: #dbe7ff;
    }

    /* ================= MAIN ================= */
    .main {
        flex: 1;
        display: flex;
        gap: 16px;
        padding: 16px;
    }

    .left-panel {
        width: 35%;
        background: white;
        border-radius: 16px;
        border: 1px solid #d7e0ef;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(96, 110, 147, 0.08);
        display: flex;
        flex-direction: column;
    }

    .form-area {
        flex: 1;
        border: 1px dashed #c8d4e8;
        border-radius: 12px;
        margin-bottom: 12px;
        background: #fafcff;
    }

    .bottom-actions {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
    }

    .btn.primary {
        background: #4c8cff;
        color: white;
    }

    .btn.secondary {
        background: #8a95b8;
        color: white;
    }

    .btn.danger {
        background: #f16d6f;
        color: white;
    }

    .right-panel {
        flex: 1;
        background: white;
        border-radius: 16px;
        border: 1px solid #d7e0ef;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(96, 110, 147, 0.08);
    }
</style>
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

    <div class="left-group">
        <div class="btn-tab">Insert</div>
        <div class="btn-tab">Update</div>
        <div class="btn-tab">Delete</div>
    </div>

    <div class="right-group">
        <div class="icon-box">🔍</div>

        <div class="search-box">
            <input placeholder="Search...">
        </div>

        <div class="icon-box">⋮</div>
    </div>

</div>

<!-- ================= SUB BAR ================= -->
<div class="subbar">

    <div>Insert</div>

    <div class="sub-tabs">
        <div class="btn-tab-sub">Products</div>
        <div class="btn-tab-sub">Attributes</div>
        <div class="btn-tab-sub">Reviews</div>
    </div>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="left-panel">
        <div class="form-area"></div>

        <div class="bottom-actions">
            <button class="btn">Cancel</button>
            <button class="btn">Confirm</button>
        </div>
    </div>

    <div class="right-panel">
        TABLE BEING QUERIED
    </div>

</div>

</body>
</html>
