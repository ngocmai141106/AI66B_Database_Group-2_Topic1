<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Product</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h2>Update Product</h2>

  <div>
    <label for="update-category">Category:</label>
    <select id="update-category">
      <option value="">--Select Category--</option>
      <!--load option cat từ js-->
    </select>
  </div>

  <div>
    <label for="update-product">Product:</label>
    <select id="update-product">
      <option value="">--Select Product--</option>
      <!--load option spham từ js-->
    </select>
  </div>

  <form id="update-form" style="display: none;">
    <!--Khu ttin basic-->
    <div>
      <label for="prod-name">Product Name:</label>
      <input type="text" id="prod-name">
    </div>

    <div>
      <label for="prod-brand">Brand:</label>
      <input type="text" id="prod-brand">
    </div>

    <div>
      <label for="prod-price">Price:</label>
      <input type="number" id="prod-price" min="1">
    </div>

    <div>
      <label for="prod-stock">Stock:</label>
      <input type="number" id="prod-stock" min="0">
    </div>

    <div>
        <label for="cat-description">Description:</label>
        <textarea id="cat-description"></textarea>
    </div>


    <!--Khu attribute-->
    <h3>Attributes</h3>
    <div id="attributes-list"></div>
    <div id="attributes-section">
      <input type="text" id="name" placeholder="Attribute name (e.g. color)">
      <input type="text" id="value" placeholder="Attribute value (e.g. purple)">
      <button type="button" id="btn-add-attribute">Add Attribute</button>
    </div>

    <!--Khu review-->
    <h3>Reviews</h3>
    <div id="reviews-list"></div>
    <div id="reviews-section">
      <input type="text" id="reviewer" placeholder="Reviewer">
      <input type="number" id="rating" min="1" max="5" placeholder="Rating">
      <input type="text" id="content" placeholder="Content">
      <button type="button" id="btn-add-review">Add Review</button>
    </div>

  </form>

</body>
</html>
