<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Insert Product</title>
  <link rel="stylesheet" href="css_style.css">
</head>
<body>

  <h2>Insert New Product</h2>

  <form id="insert-form">
    <!--basic information zone-->
    <div>
      <label for="input-name">Product Name:</label>
      <input type="text" id="input-name" required>
    </div>

    <div>
      <label for="input-category">Category:</label>
      <select id="input-category" required>
        <option value="">-- Select Category --</option>
        <option value="Phone">Phone</option>
        <option value="Fashion">Fashion</option>
        <option value="Book">Book</option>
      </select>
    </div>

    <div>
      <label for="input-brand">Brand:</label>
      <input type="text" id="input-brand" required>
    </div>

    <div>
      <label for="input-price">Price:</label>
      <input type="number" id="input-price" min="1" required>
    </div>

    <div>
      <label for="input-stock">Stock:</label>
      <input type="number" id="input-stock" min="0" required>
    </div>

    <div>
      <label for="input-description">Description:</label>
      <textarea id="input-description"></textarea>
    </div>

    <!--attribute-->
    <h3>Attributes</h3>
    <div id="attributes-section">
      <input type="text" id="name" placeholder="Attribute name (e.g. color)">
      <input type="text" id="value" placeholder="Attribute value (e.g. purple)">
      <button type="button" id="btn-add-attribute">Add Attribute</button>

    </div>
    <div id="attributes-list"></div>

    <!--review-->
    <h3>Reviews</h3>
    <div id="reviews-section">
      <input type="text" id="reviewer" placeholder="Reviewer">
      <input type="number" id="rating" min="1" max="5" placeholder="Rating">
      <input type="text" id="content" placeholder="Content">
      <button type="button" id="btn-add-review">Add Review</button>
    </div>
    <div id="reviews-list"></div>

  </form>

  <script src="insert.js"></script>
</body>
</html>
